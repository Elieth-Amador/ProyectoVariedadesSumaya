    <header class="site-header">
        <input id="nav-toggle" class="nav-toggle" type="checkbox" aria-hidden="true">
        <label for="nav-toggle" class="hamburger" aria-label="Abrir menú">
            <span></span><span></span><span></span>
        </label>
        <nav class="main-nav">
            <a class="nav-logo" href="index.html"><img src="Sources/Sumaya1.jpeg" alt="Logo"><span
                    class="site-title">Variedades Sumaya</span></a>
            <ul class="nav-list">
                <li><a href="index.html">Inicio</a></li>

    <main class="gallery-main">
        <section class="carrusel-section">
            <h2 class="gallery-title" style="text-align: center; font-size: 2.5rem; margin-bottom: 20px;">Nuestra Galería</h2>

            <div class="carrusel">
                <div class="carrusel-track">
                    <div class="carrusel-item">
                        <img src="Sources/calzadovariedades.jpeg" alt="Calzado Variedades Sumaya">
                        <p class="caption">Nueva Colección</p>
                    </div>
                    <div class="carrusel-item">
                        <img src="Sources/interior.jpeg" alt="Interior de la tienda">
                        <p class="caption">Nuestra Tienda</p>
                    </div>
                    <div class="carrusel-item">
                        <img src="Sources/atencion.jpeg" alt="Atención al cliente">
                        <p class="caption">Calidad y Servicio</p>
                    </div>
                    <div class="carrusel-item">
                        <img src="Sources/modelos.jpeg" alt="Modelos exclusivos">
                        <p class="caption">Estilo Único</p>
                    </div>
                    <div class="carrusel-item"><img src="Sources/variedad.jpeg" alt="Galeria">
                        <p class="caption">Variedad</p>
                    </div>
                    <div class="carrusel-item"><img src="Sources/comfort.jpeg" alt="Galeria">
                        <p class="caption">Confort</p>
                    </div>
                    <div class="carrusel-item"><img src="Sources/tendencia.jpeg" alt="Galeria">
                        <p class="caption">Tendencia</p>
                    </div>
                    <div class="carrusel-item"><img src="Sources/Sumaya1.jpeg" alt="Galeria">
                        <p class="caption">Honduras</p>
                    </div>
                </div>

                <button id="prev" class="carrusel_btn"><i class="fas fa-chevron-left"></i></button>
                <button id="next" class="carrusel_btn"><i class="fas fa-chevron-right"></i></button>

                <div class="carousel-dots"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Variedades Sumaya</p>
    </footer>
